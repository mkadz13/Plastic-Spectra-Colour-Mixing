<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpectOptiBlend Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #4F2683;
      --purple-dark: #3b1c63;
      --surface: #f7f7f8;
      --border: #d9d9d9;
      --text: #333;
      --muted: #6b6b6b;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff;
      color: var(--text);
      line-height: 1.5;
      max-width: 420px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem;
    }
    h1 { font-size: 1.25rem; color: var(--purple); margin-bottom: 0.5rem; }
    p.note { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.25rem; }
    .panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1.1rem;
      background: var(--surface);
    }
    label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.35rem; }
    input[type="password"], select {
      width: 100%; padding: 0.5rem 0.55rem; border: 1px solid var(--border); border-radius: 3px;
      font-size: 0.9rem; margin-bottom: 0.85rem;
      background: #fff;
    }
    button {
      padding: 0.5rem 1rem; border-radius: 3px; border: none; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; margin-right: 0.4rem; margin-top: 0.15rem;
    }
    .btn-primary { background: var(--purple); color: #fff; }
    .btn-primary:hover { background: var(--purple-dark); }
    .btn-ok { background: #2e7d32; color: #fff; }
    .btn-no { background: #b71c1c; color: #fff; }
    .btn-secondary { background: #fff; color: var(--purple); border: 1px solid var(--purple); }
    .btn-secondary:hover { background: #f4effa; }
    .section-title { margin-top: 1rem; margin-bottom: 0.4rem; font-size: 0.9rem; font-weight: 700; color: #444; }
    .hidden { display: none; }
    .row {
      border: 1px solid var(--border); border-radius: 4px; padding: 0.75rem; margin-bottom: 0.6rem;
      background: #fff;
    }
    .row .meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; }
    .err { color: #b71c1c; font-size: 0.85rem; margin-top: 0.65rem; }
    .ok { color: #2e7d32; font-size: 0.85rem; margin-top: 0.65rem; }
    #list { margin-top: 1.1rem; }
  </style>
</head>
<body>
  <h1>SpectOptiBlend - Pending Spectra</h1>
  <p class="note">
    Enter the <strong>admin password</strong>. It stays in this browser tab only until you close it.
    Approving adds a color to the live library (target and ingredient menus).
  </p>

  <div class="panel">
    <label for="admin-password">Admin password</label>
    <input type="password" id="admin-password" autocomplete="off" />
    <button class="btn-primary" type="button" id="unlock-btn">Unlock admin</button>
  </div>

  <div class="panel hidden" id="actions-panel" style="margin-top:0.85rem;">
    <div class="section-title" style="margin-top:0;">Pending submissions</div>
    <button class="btn-primary" type="button" id="load-btn">Load pending</button>
    <div class="section-title">Remove approved color</div>
    <label for="remove-color-select">Color name</label>
    <select id="remove-color-select">
      <option value="">Select approved color...</option>
    </select>
    <button class="btn-primary" type="button" id="remove-btn">Remove color</button>
    <button class="btn-secondary" type="button" id="refresh-colors-btn">Refresh list</button>
  </div>

  <p id="msg" class="ok"></p>
  <p id="err" class="err"></p>
  <div id="list"></div>

<script>
function apiBase() {
  return location.origin.replace(/\/$/, "");
}

function token() {
  return document.getElementById("admin-password").value.trim();
}

function setErr(t) {
  document.getElementById("err").textContent = t || "";
}
function setOk(t) {
  document.getElementById("msg").textContent = t || "";
}

async function loadPending() {
  setErr(""); setOk("");
  const t = token();
  if (!t) { setErr("Enter the admin password."); return; }
  const res = await fetch(`${apiBase()}/api/admin/pending`, {
    headers: { Authorization: "Bearer " + t },
  });
  if (!res.ok) {
    let d = "";
    try { d = (await res.json()).detail || ""; } catch (_) {}
    setErr(d || res.statusText);
    return;
  }
  const items = await res.json();
  setOk(items.length ? `${items.length} pending.` : "No pending submissions.");
  const box = document.getElementById("list");
  box.innerHTML = "";
  items.forEach(it => {
    const el = document.createElement("div");
    el.className = "row";
    el.innerHTML = `
      <div><strong>${escapeHtml(it.color_name)}</strong> <span style="color:#666">#${it.id}</span></div>
      <div class="meta">${escapeHtml(it.submitter_email)} · ${escapeHtml(it.created_at)}</div>
      <div>
        <button class="btn-ok" type="button" data-a="${it.id}">Approve</button>
        <button class="btn-no" type="button" data-r="${it.id}">Reject</button>
      </div>`;
    box.appendChild(el);
  });
  box.querySelectorAll("button[data-a]").forEach(b => {
    b.addEventListener("click", () => act("approve", b.getAttribute("data-a")));
  });
  box.querySelectorAll("button[data-r]").forEach(b => {
    b.addEventListener("click", () => act("reject", b.getAttribute("data-r")));
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

async function act(kind, id) {
  setErr(""); setOk("");
  const t = token();
  const url = `${apiBase()}/api/admin/${kind}/${id}`;
  const res = await fetch(url, {
    method: "POST",
    headers: { Authorization: "Bearer " + t },
  });
  if (!res.ok) {
    let d = "";
    try { d = (await res.json()).detail || ""; } catch (_) {}
    setErr(d || res.statusText);
    return;
  }
  setOk(kind === "approve" ? "Approved." : "Rejected.");
  await loadPending();
}

async function loadRemovableColors() {
  setErr("");
  const t = token();
  const sel = document.getElementById("remove-color-select");
  sel.innerHTML = '<option value="">Select approved color...</option>';
  const res = await fetch(`${apiBase()}/api/admin/removable-colors`, {
    headers: { Authorization: "Bearer " + t },
  });
  if (!res.ok) {
    let d = "";
    try { d = (await res.json()).detail || ""; } catch (_) {}
    setErr(d || res.statusText);
    return;
  }
  const out = await res.json();
  const arr = Array.isArray(out.colors) ? out.colors : [];
  arr.forEach(name => {
    const op = document.createElement("option");
    op.value = name;
    op.textContent = name;
    sel.appendChild(op);
  });
  if (!arr.length) {
    setOk("No removable approved colors found.");
  }
}

async function removeColor() {
  setErr(""); setOk("");
  const t = token();
  if (!t) { setErr("Enter the admin password."); return; }
  const colorName = document.getElementById("remove-color-select").value.trim();
  if (!colorName) { setErr("Select a color to remove."); return; }
  const res = await fetch(`${apiBase()}/api/admin/remove-color`, {
    method: "POST",
    headers: {
      Authorization: "Bearer " + t,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ color_name: colorName }),
  });
  if (!res.ok) {
    let d = "";
    try { d = (await res.json()).detail || ""; } catch (_) {}
    setErr(d || res.statusText);
    return;
  }
  const out = await res.json();
  setOk(out.message || "Color removed.");
  await loadRemovableColors();
  await loadPending();
}

async function unlockAdmin() {
  setErr(""); setOk("");
  const t = token();
  if (!t) { setErr("Enter the admin password."); return; }
  const res = await fetch(`${apiBase()}/api/admin/pending`, {
    headers: { Authorization: "Bearer " + t },
  });
  if (!res.ok) {
    let d = "";
    try { d = (await res.json()).detail || ""; } catch (_) {}
    setErr(d || res.statusText);
    return;
  }
  document.getElementById("actions-panel").classList.remove("hidden");
  setOk("Admin unlocked.");
  await loadRemovableColors();
}

document.getElementById("unlock-btn").addEventListener("click", unlockAdmin);
document.getElementById("load-btn").addEventListener("click", loadPending);
document.getElementById("remove-btn").addEventListener("click", removeColor);
document.getElementById("refresh-colors-btn").addEventListener("click", loadRemovableColors);
</script>
</body>
</html>
